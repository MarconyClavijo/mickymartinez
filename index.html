<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grupo Marcony | Radios en Vivo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(140deg,#111,#330033,#000);
color:white;
text-align:center;
}

/* HEADER */

header{
padding:30px 20px;
}

header img{
width:200px;
border-radius:15px;
box-shadow:0 0 20px #ff00cc;
}

header h1{
margin:10px 0 0;
font-size:32px;
}

/* CONTENEDOR */

.radios{
display:flex;
flex-direction:column;
align-items:center;
gap:30px;
padding:30px 20px;
}

/* TARJETA RADIO */

.radio{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border-radius:20px;
padding:25px;
width:300px;
box-shadow:0 0 25px rgba(0,0,0,.6);
transition:.3s;
}

.radio:hover{
transform:scale(1.05);
}

.radio img{
width:140px;
cursor:pointer;
}

.radio h2{
margin:10px 0;
font-size:20px;
}

.radio button{
background:#ff0000;
border:none;
padding:12px 25px;
border-radius:30px;
color:white;
font-weight:bold;
cursor:pointer;
margin-top:10px;
box-shadow:0 0 15px #ff0000;
}

/* REPRODUCTOR GLOBAL */

.player{
margin-top:25px;
}

audio{
width:300px;
}

/* CANCION */

.song{
margin-top:10px;
font-size:16px;
color:#00ffcc;
}

/* PUBLICIDAD */

.ads{
margin:40px auto;
max-width:700px;
background:linear-gradient(90deg,#ff0000,#ff7300);
padding:25px;
border-radius:20px;
box-shadow:0 0 25px rgba(0,0,0,.7);
}

.ads a{
display:inline-block;
margin-top:10px;
background:white;
color:black;
padding:12px 25px;
border-radius:30px;
text-decoration:none;
font-weight:bold;
}

/* FOOTER */

footer{
margin-top:30px;
padding:15px;
font-size:13px;
opacity:.8;
}

</style>

</head>

<body>

<header>

<img src="https://image2url.com/r2/default/images/1773416083732-ec4c7115-86a4-49a1-aaa8-8c9093b13595.jpeg">

<h1>GRUPO MARCONY</h1>

</header>

<div class="radios">

<!-- STEREO M -->

<div class="radio">

<img src="https://i.postimg.cc/L8bjb6K5/1687464033296.png"
onclick="playRadio('https://sonic.globalstream.pro/8108/stream','Radio Stereo M','https://sonic.globalstream.pro/8108/stats?json=1')">

<h2>Radio Stereo M</h2>

<button onclick="playRadio('https://sonic.globalstream.pro/8108/stream','Radio Stereo M','https://sonic.globalstream.pro/8108/stats?json=1')">
▶ Escuchar
</button>

</div>

<!-- MARCONY RADIO -->

<div class="radio">

<img src="https://image2url.com/r2/default/images/1773420804233-23cff9c7-2df0-45a2-aab1-9ad4df661614.png"
onclick="playRadio('https://radiostreaming.pro/8216/stream','Marcony Radio','https://radiostreaming.pro/8216/stats?json=1')">

<h2>Marcony Radio</h2>

<button onclick="playRadio('https://radiostreaming.pro/8216/stream','Marcony Radio','https://radiostreaming.pro/8216/stats?json=1')">
▶ Escuchar
</button>

</div>

<!-- LA TREMENDA -->

<div class="radio">

<img src="https://imgfz.com/i/h7TrEm5.png"
onclick="playRadio('https://sonic.globalstream.pro/8080/stream','La Tremenda 106.5 FM','https://sonic.globalstream.pro/8080/stats?json=1')">

<h2>La Tremenda 106.5 FM</h2>

<button onclick="playRadio('https://sonic.globalstream.pro/8080/stream','La Tremenda 106.5 FM','https://sonic.globalstream.pro/8080/stats?json=1')">
▶ Escuchar
</button>

</div>

</div>

<!-- REPRODUCTOR -->

<div class="player">

<h3 id="radioName">Selecciona una radio</h3>

<div class="song" id="songTitle">🎵 Esperando canción...</div>

<audio controls id="player"></audio>

</div>

<!-- PUBLICIDAD -->

<div class="ads">

<h3>📢 Publicidad en nuestras radios</h3>

<p>Promociona tu negocio en el Grupo Marcony</p>

<a href="https://wa.me/51942883375">
WhatsApp 942883375 – Marcony Clavijo
</a>

</div>

<footer>

© 2026 Grupo Marcony – Plataforma de Radios Online

</footer>

<script>

const player=document.getElementById("player")
const radioName=document.getElementById("radioName")
const songTitle=document.getElementById("songTitle")

let metadataURL=""

function playRadio(url,name,meta){

player.pause()
player.src=url+"?"+Date.now()
player.play()

radioName.innerText="🔴 EN VIVO: "+name

metadataURL=meta

getSong()

}

function getSong(){

setInterval(async()=>{

if(metadataURL!=""){

try{

let res=await fetch(metadataURL)
let data=await res.json()

songTitle.innerText="🎵 "+data.songtitle

}catch{

songTitle.innerText="🎵 Sonando ahora..."

}

}

},8000)

}

</script>

</body>
</html>
