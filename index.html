<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grupo Marcony | Radios en Vivo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(140deg,#0a0a0a,#2b0030,#000);
color:white;
text-align:center;
}

/* HEADER */

header{
padding:30px 20px;
}

header img{
width:200px;
border-radius:15px;
box-shadow:0 0 25px #ff00cc;
}

header h1{
margin:10px 0 0;
font-size:34px;
letter-spacing:2px;
}

/* CONTENEDOR RADIOS */

.radios{
display:flex;
flex-direction:column;
align-items:center;
gap:30px;
padding:30px 20px;
}

/* TARJETA RADIO */

.radio{
background:rgba(255,255,255,0.06);
backdrop-filter:blur(12px);
border-radius:20px;
padding:25px;
width:300px;
box-shadow:0 0 25px rgba(0,0,0,.6);
transition:.3s;
position:relative;
}

.radio:hover{
transform:scale(1.06);
}

/* RADIO ACTIVA */

.radio.active{
box-shadow:0 0 30px #ff0000;
border:2px solid #ff0000;
}

/* LOGO RADIO */

.radio img{
width:140px;
cursor:pointer;
}

/* TITULO */

.radio h2{
margin:10px 0;
font-size:20px;
}

/* BOTON */

.radio button{
background:#ff0000;
border:none;
padding:12px 25px;
border-radius:30px;
color:white;
font-weight:bold;
cursor:pointer;
margin-top:10px;
box-shadow:0 0 15px #ff0000;
}

/* EN VIVO */

.live{
position:absolute;
top:10px;
right:15px;
background:red;
padding:4px 10px;
font-size:12px;
border-radius:20px;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1}
50%{opacity:.4}
100%{opacity:1}
}

/* PLAYER */

.player{
margin-top:30px;
}

audio{
width:300px;
margin-top:10px;
}

/* ECUALIZADOR */

.equalizer{
display:flex;
justify-content:center;
gap:4px;
margin-top:10px;
}

.bar{
width:5px;
height:20px;
background:#ff0000;
animation:equalize 1s infinite;
}

.bar:nth-child(2){animation-delay:.2s}
.bar:nth-child(3){animation-delay:.4s}
.bar:nth-child(4){animation-delay:.6s}
.bar:nth-child(5){animation-delay:.8s}

@keyframes equalize{
0%{height:10px}
50%{height:25px}
100%{height:10px}
}

/* PUBLICIDAD */

.ads{
margin:40px auto;
max-width:700px;
background:linear-gradient(90deg,#ff0000,#ff7300);
padding:25px;
border-radius:20px;
box-shadow:0 0 25px rgba(0,0,0,.7);
}

.ads a{
display:inline-block;
margin-top:10px;
background:white;
color:black;
padding:12px 25px;
border-radius:30px;
text-decoration:none;
font-weight:bold;
}

/* FOOTER */

footer{
margin-top:30px;
padding:15px;
font-size:13px;
opacity:.8;
}

</style>

</head>

<body>

<header>

<img src="https://image2url.com/r2/default/images/1773416083732-ec4c7115-86a4-49a1-aaa8-8c9093b13595.jpeg">

<h1>GRUPO MARCONY</h1>

</header>

<div class="radios">

▶ Escuchar
</button>

</div>

<!-- MARCONY RADIO -->

<div class="radio" id="radio2">

<div class="live">EN VIVO</div>

<img src="https://image2url.com/r2/default/images/1773420804233-23cff9c7-2df0-45a2-aab1-9ad4df661614.png"
onclick="playRadio('https://radiostreaming.pro/8216/stream','Marcony Radio','radio2')">

<h2>Marcony Radio</h2>

<button onclick="playRadio('https://radiostreaming.pro/8216/stream','Marcony Radio','radio2')">
▶ Escuchar

</div>

<!-- LA TREMENDA -->

onclick="playRadio('https://sonic.globalstream.pro/8080/stream','La Tremenda 106.5 FM','radio3')">

</button>

</div>

</div>

<!-- PLAYER -->

<div class="player">

<h3 id="radioName">Selecciona una radio</h3>

<audio controls id="player"></audio>

<div class="equalizer">

<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>

</div>

</div>

<!-- PUBLICIDAD -->

<div class="ads">

<h3>📢 Publicidad en nuestras radios</h3>

<p>Promociona tu negocio en el Grupo Marcony</p>

<a href="https://wa.me/51942883375">
WhatsApp 942883375 – Marcony Clavijo
</a>

</div>

<footer>

© 2026 Grupo Marcony – Plataforma de Radios Online

</footer>

<script>

const player=document.getElementById("player")
const radioName=document.getElementById("radioName")

function playRadio(url,name,id){

player.pause()

player.src=url+"?"+Date.now()

player.play()

radioName.innerText="🔴 EN VIVO: "+name

document.querySelectorAll(".radio").forEach(r=>{
r.classList.remove("active")
})

document.getElementById(id).classList.add("active")

}

</script>

</body>
</html>
