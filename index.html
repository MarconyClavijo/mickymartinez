<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grupo Marcony | Radios</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:#f2f2f2;
text-align:center;
}

h1{
margin:25px;
color:#333;
}

/* GRID RADIOS */

.radios{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:20px;
padding:20px;
max-width:900px;
margin:auto;
}

/* TARJETA */

.radio{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 4px 12px rgba(0,0,0,.15);
transition:.3s;
cursor:pointer;
}

.radio:hover{
transform:scale(1.05);
}

/* AREA COLOR */

.radio-top{
height:130px;
display:flex;
align-items:center;
justify-content:center;
position:relative;
}

/* LOGO */

.radio-top img{
width:80px;
}

/* BOTON PLAY */

.play{
position:absolute;
bottom:-25px;
background:linear-gradient(45deg,#ff00cc,#6a00ff);
width:50px;
height:50px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:20px;
box-shadow:0 5px 15px rgba(0,0,0,.4);
}

/* TITULO */

.radio-name{
padding:35px 10px 15px;
font-weight:600;
}

/* RADIO ACTIVA */

.active{
box-shadow:0 0 15px red;
}

/* PLAYER */

.player{
margin:30px;
}

audio{
width:300px;
}

</style>

</head>

<body>

<h1>GRUPO MARCONY</h1>

<div class="radios">

<!-- STEREO M -->

<div class="radio" id="r1"
onclick="playRadio('https://sonic.globalstream.pro/8108/stream','Stereo M','r1')">

<div class="radio-top" style="background:#ffd400">

<img src="https://i.postimg.cc/L8bjb6K5/1687464033296.png">

<div class="play">▶</div>

</div>

<div class="radio-name">Stereo M</div>

</div>

<!-- MARCONY RADIO -->

<div class="radio" id="r2"
onclick="playRadio('https://radiostreaming.pro/8216/stream','Marcony Radio','r2')">

<div class="radio-top" style="background:#2f7edb">

<img src="https://image2url.com/r2/default/images/1773420804233-23cff9c7-2df0-45a2-aab1-9ad4df661614.png">

<div class="play">▶</div>

</div>

<div class="radio-name">Marcony Radio</div>

</div>

<!-- LA TREMENDA -->

<div class="radio" id="r3"
onclick="playRadio('https://sonic.globalstream.pro/8080/stream','La Tremenda','r3')">

<div class="radio-top" style="background:#ff3d00">

<img src="https://imgfz.com/i/h7TrEm5.png">

<div class="play">▶</div>

</div>

<div class="radio-name">La Tremenda</div>

</div>

</div>

<div class="player">

<h3 id="radioTitle">Selecciona una radio</h3>

<audio controls id="player"></audio>

</div>

<script>

const player=document.getElementById("player")
const title=document.getElementById("radioTitle")

function playRadio(url,name,id){

player.pause()

player.src=url+"?"+Date.now()

player.play()

title.innerText="🔴 EN VIVO: "+name

document.querySelectorAll(".radio").forEach(r=>{
r.classList.remove("active")
})

document.getElementById(id).classList.add("active")

}

</script>

</body>
</html>
