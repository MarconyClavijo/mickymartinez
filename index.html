<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marcony Radio - En Vivo</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Orbitron', sans-serif;
    background: radial-gradient(circle at top,#ff00cc,#111,#000);
    color:white;
    text-align:center;
    overflow:hidden;
}

body::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background: linear-gradient(45deg,#ff00cc,#00ffff,#ffcc00,#ff0000);
    animation: moveBg 10s linear infinite;
    opacity:0.12;
}
@keyframes moveBg{
    0%{transform:translate(-25%,-25%) rotate(0deg);}
    100%{transform:translate(-25%,-25%) rotate(360deg);}
}

.container{
    position:relative;
    z-index:2;
    margin-top:60px;
}

.logo{
    width:220px;
    border-radius:50%;
    box-shadow:0 0 40px #ff00cc;
}

.spin{
    animation: spin 8s linear infinite;
}
@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

h1{
    font-size:32px;
    margin-top:20px;
    text-shadow:0 0 20px #ff00cc,0 0 40px #00ffff;
}

.sub{
    font-size:14px;
    letter-spacing:3px;
    margin-bottom:30px;
    color:#ffcc00;
}

.playBtn{
    background:#ff0000;
    border:none;
    padding:20px 40px;
    font-size:20px;
    border-radius:50px;
    color:white;
    cursor:pointer;
    box-shadow:0 0 25px #ff0000;
    transition:0.3s;
}

.playBtn:hover{
    transform:scale(1.1);
    box-shadow:0 0 50px #ff0000;
}

.status{
    margin-top:20px;
    font-size:14px;
    color:#00ffff;
}

.social{
    margin-top:40px;
}

.social a{
    display:inline-block;
    margin:10px;
    padding:12px 25px;
    border-radius:30px;
    text-decoration:none;
    color:white;
    font-size:14px;
    transition:0.3s;
}

.fb{ background:#1877f2; }
.wa{ background:#25d366; }

.social a:hover{
    transform:scale(1.1);
}

footer{
    margin-top:50px;
    font-size:12px;
    opacity:0.6;
}
</style>
</head>

<body>

<div class="container">

<img src="https://image2url.com/r2/default/images/1772424553305-5e1866b9-0926-4d13-9fad-dae04af28c89.png"
class="logo" id="logo">

<h1>MARCONY RADIO</h1>
<div class="sub">TRANSMITIENDO EN VIVO 24/7</div>

<audio id="radio" preload="none"></audio>

<button class="playBtn" onclick="toggleRadio()">▶ ESCUCHAR EN VIVO</button>

<div class="status" id="status">Radio detenida</div>

<div class="social">
<a class="fb" href="https://www.facebook.com/radiomarcony" target="_blank">📘 Facebook</a>
<a class="wa" href="https://wa.me/51942883375" target="_blank">💬 WhatsApp</a>
</div>

<footer>
Página creada por Marcony Clavijo
</footer>

</div>

<script>
const STREAM_URL = "https://radiostreaming.pro/8214/stream";
const radio = document.getElementById("radio");
const statusText = document.getElementById("status");
const button = document.querySelector(".playBtn");
const logo = document.getElementById("logo");

function connectLive(){
    radio.src = STREAM_URL + "?t=" + new Date().getTime();
    radio.load();
    radio.play();
}

function toggleRadio(){
    if(radio.paused){
        connectLive();
    }else{
        radio.pause();
        radio.removeAttribute("src");
        radio.load();
    }
}

radio.addEventListener("play", function(){
    statusText.innerText = "🔴 EN VIVO";
    button.innerText = "⏹ DETENER";
    logo.classList.add("spin");
});

radio.addEventListener("pause", function(){
    statusText.innerText = "Radio detenida";
    button.innerText = "▶ ESCUCHAR EN VIVO";
    logo.classList.remove("spin");
});

/* 🔥 Cuando vuelves a la pestaña se reconecta si estaba en vivo */
document.addEventListener("visibilitychange", function(){
    if(!document.hidden && !radio.paused){
        connectLive();
    }
});

radio.addEventListener("error", function(){
    statusText.innerText = "⚠ Error conectando al streaming";
});
</script>

</body>
</html>
