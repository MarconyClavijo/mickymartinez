<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio Stereo M 101.5 FM</title>
<link href="https://googleapis.com" rel="stylesheet">
<style>
:root{--azul:#0b3d91;--amarillo:#ffd700;--rojo:#e60000;--blanco:#fff;--gris:#f5f5f5;}
*{box-sizing:border-box}
body{margin:0;font-family:Raleway,sans-serif;background:#eef4ff;color:#222}

/* --- NUEVO HEADER TIPO HAMBURGUESA (CENTRADO Y RECONSTRUIDO) --- */
header{background:var(--azul);padding:15px 12px;position:relative}
.navbar{max-width:1100px;margin:auto;display:flex;justify-content:center;align-items:center;position:relative;min-height:65px}
.brand{display:flex;flex-direction:column;align-items:center;text-align:center;width:100%}
.logo{width:90px;animation:flotar 2.5s infinite;margin-bottom:5px;display:block}

.menu-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:1px solid rgba(255,255,255,0.4);color:white;font-size:18px;padding:6px 12px;border-radius:6px;cursor:pointer;}
.menu-toggle:hover{border-color:var(--amarillo);color:var(--amarillo)}
.nav-links{display:none;width:100%;text-align:center;position:absolute;top:100%;left:0;background:var(--azul);z-index:999;border-top:1px solid rgba(255,255,255,0.1);padding-bottom:10px}
.nav-links.active{display:block}
.nav-links a{display:block;color:white;text-decoration:none;margin:12px 0;font-weight:bold;font-size:16px;}
.nav-links a:hover{color:var(--amarillo)}

@media(min-width:769px){
  .navbar{justify-content:space-between}
  .brand{width:auto;align-items:flex-start;text-align:left}
  .menu-toggle{display:none}
  .nav-links{display:flex;position:static;width:auto;background:none;border:none;padding:0}
  .nav-links a{margin:0 15px}
}

.slogan{color:#ffd700;font-weight:bold;margin-top:8px}
.banner img{display:block;width:100%;max-height:420px;object-fit:cover}
.main{max-width:1100px;margin:auto;padding:25px;display:grid;grid-template-columns:2fr 1fr;gap:20px}
.card{background:#fff;border-radius:18px;padding:20px;box-shadow:0 5px 15px rgba(0,0,0,.15)}
audio{width:100%}
.live{color:#e60000;font-weight:bold;margin:10px 0}
#song-title{font-weight:bold;color:#0b3d91}
.buttons a{display:block;text-decoration:none;background:var(--amarillo);color:#111;padding:12px;border-radius:30px;text-align:center;margin-bottom:10px;font-weight:bold}
.events{max-width:1100px;margin:20px auto;padding:0 20px}
.events h2{text-align:center;color:#0b3d91}
.slider{position:relative;max-width:420px;margin:0 auto}
.slide{display:none}
.slide.active{display:block}
.slide img{width:100%;border-radius:15px;box-shadow:0 3px 10px rgba(0,0,0,.15)}
footer{background:#0b3d91;color:#fff;text-align:center;padding:18px;margin-top:30px}
@keyframes flotar{50%{transform:translateY(-8px)}}
@media(max-width:768px){.main{grid-template-columns:1fr}.slider{max-width:320px}}
</style>
</head><body>

<header>
  <div class="navbar">
    <div class="brand">
      <img class="logo" src="https://postimg.cc">
      <div style="color:#fff;font-size:14px;letter-spacing:1px;">Sullana - Piura</div>
    </div>
    
    <!-- Botón único de Menú Hamburguesa -->
    <button class="menu-toggle" onclick="toggleMenu()">☰</button>
    
    <!-- Enlaces que se ocultan en móvil -->
    <nav class="nav-links" id="menuLinks">
      <a style="color:white;margin:10px">Inicio</a>
      <a style="color:white;margin:10px">En Vivo</a>
      <a style="color:white;margin:10px">Eventos</a>
      <a style="color:white;margin:10px">Programación</a>
    </nav>
  </div>
</header>

<div class="banner"><img src="http://imgfz.com"></div>
<div class="main">
<div class="card">
    <h2>🎧 Escúchanos en Vivo</h2>
    <audio id="radioPlayer" controls preload="none"></audio>
    <div class="live">🔴 EN VIVO</div>
    <div id="song-title"><span id="sonic_title">Cargando canción...</span></div>
    
    <!-- Sección Al Aire Ahora incorporada correctamente -->
    <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">
    <h3 style="margin-top:0;">🟢 AL AIRE AHORA</h3>
    <div id="locutor" style="margin-bottom: 5px;"></div>
    <div id="horario"></div>
</div>

<div class="card buttons">
<a href="https://google.com" target="_blank">📲 Descargar App</a>
<a href="https://facebook.com" target="_blank">📘 Facebook</a>
<a href="https://wa.me" target="_blank">🎤 WhatsApp Oyentes</a>
<a href="https://wa.me" target="_blank">📢 Publicidad</a>
</div>
</div>

<section class="events">
<h2>🎉 Entérate de los eventos</h2>
<div class="slider">
<div class="slide active"><img src="http://imgfz.com"></div>
<div class="slide"><img src="http://imgfz.com"></div>
<div class="slide"><img src="http://imgfz.com"></div>
</div>
</section>
<footer>Diseño y desarrollo web por Marcony Clavijo | 942883375</footer>

<script>

function toggleMenu() {
    var links = document.getElementById("menuLinks");
    links.classList.toggle("active");

ap();
setInterval(ap,60000);
</script>

</body></html>
