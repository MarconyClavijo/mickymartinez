<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marcony Radio - En Vivo</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Orbitron',sans-serif;
background: radial-gradient(circle at top,#ff00cc,#111,#000);
color:white;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
text-align:center;
}

/* contenedor */

.container{
max-width:450px;
width:90%;
}

/* logo */

.logo{
width:200px;
border-radius:50%;
box-shadow:0 0 30px #ff00cc;
margin-bottom:20px;
}

/* gira cuando suena */

.spin{
animation:spin 8s linear infinite;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

h1{
margin:10px 0;
font-size:30px;
}

.sub{
font-size:13px;
letter-spacing:2px;
color:#ffcc00;
margin-bottom:30px;
}

/* boton */

.playBtn{
background:#ff0000;
border:none;
padding:18px 35px;
font-size:18px;
border-radius:40px;
color:white;
cursor:pointer;
box-shadow:0 0 20px #ff0000;
transition:.3s;
}

.playBtn:hover{
transform:scale(1.08);
}

.status{
margin-top:20px;
font-size:14px;
color:#00ffff;
}

.song{
margin-top:10px;
color:#ffcc00;
font-size:15px;
}

.social{
margin-top:35px;
}

.social a{
display:inline-block;
margin:6px;
padding:10px 20px;
border-radius:25px;
text-decoration:none;
color:white;
font-size:14px;
}

.fb{background:#1877f2;}
.wa{background:#25d366;}

footer{
margin-top:40px;
font-size:12px;
opacity:.6;
}

</style>
</head>

<body>

<div class="container">

<img src="https://image2url.com/r2/default/images/1772424553305-5e1866b9-0926-4d13-9fad-dae04af28c89.png" class="logo" id="logo">

<h1>MARCONY RADIO</h1>

<div class="sub">TRANSMITIENDO EN VIVO 24/7</div>

<audio id="radio"></audio>

<button class="playBtn" id="btn" onclick="toggleRadio()">▶ ESCUCHAR EN VIVO</button>

<div class="status" id="status">Radio detenida</div>

<div class="song">
🎵 <span id="sonic_title">Cargando canción...</span>
</div>

<!-- Script del servidor para canciones -->
<script id="sonic_js" data-port="8216" src="https://radiostreaming.pro/cp/widgets.js?r=846"></script>

<div class="social">

<a class="fb" href="https://www.facebook.com/radiomarcony" target="_blank">Facebook</a>

<a class="wa" href="https://wa.me/51942883375" target="_blank">WhatsApp</a>

</div>

<footer>
Página creada por Marcony Clavijo
</footer>

</div>

<script>

const radio=document.getElementById("radio");
const statusText=document.getElementById("status");
const button=document.getElementById("btn");
const logo=document.getElementById("logo");

let playing=false;
let manualStop=false;

function toggleRadio(){

if(!playing){

radio.src="https://radiostreaming.pro/8216/stream?"+Date.now();

radio.play();

playing=true;
manualStop=false;

}else{

manualStop=true;

radio.pause();

radio.src="";

playing=false;

statusText.innerText="Radio detenida";

button.innerText="▶ ESCUCHAR EN VIVO";

logo.classList.remove("spin");

}

}

/* cuando empieza */

radio.addEventListener("play",function(){

statusText.innerText="🔴 EN VIVO";

button.innerText="⏹ DETENER";

logo.classList.add("spin");

});

/* error real */

radio.addEventListener("error",function(){

if(!manualStop){

statusText.innerText="⚠ Error conectando al streaming";

}

});

</script>

</body>
</html>
