<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grupo Marcony | Radios en Vivo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:#f2f2f2;
text-align:center;
}

/* LOGO */

.header{
padding:25px 10px;
}

.header img{
width:180px;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,.3);
}

/* RADIOS GRID (ARREGLADO) */

.radios{
display:grid;
grid-template-columns:repeat(2,1fr); /* 👈 AQUÍ EL CAMBIO */
gap:20px;
padding:20px;
max-width:900px;
margin:auto;
}

/* TARJETA */

.radio{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 4px 12px rgba(0,0,0,.15);
transition:.3s;
cursor:pointer;
}

.radio:hover{
transform:scale(1.05);
}

.radio-top{
height:130px;
display:flex;
align-items:center;
justify-content:center;
position:relative;
}

.radio-top img{
width:80px;
}

/* BOTON */

.play{
position:absolute;
bottom:-25px;
background:linear-gradient(45deg,#ff00cc,#6a00ff);
width:50px;
height:50px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:22px;
box-shadow:0 5px 15px rgba(0,0,0,.4);
}

/* TITULO */

.radio-name{
padding:35px 10px 15px;
font-weight:600;
}

/* ACTIVA */

.active{
box-shadow:0 0 15px red;
}

/* PLAYER */

.player{
margin:30px;
}

audio{
width:300px;
}

/* PUBLICIDAD */

.ads{
margin:40px auto;
max-width:600px;
background:linear-gradient(90deg,#ff0000,#ff7300);
padding:25px;
border-radius:20px;
color:white;
box-shadow:0 5px 20px rgba(0,0,0,.4);
}

.ads a{
display:inline-block;
margin-top:10px;
background:white;
color:black;
padding:10px 20px;
border-radius:25px;
text-decoration:none;
font-weight:bold;
}

footer{
margin-top:20px;
padding:15px;
font-size:13px;
opacity:.8;
}

/* OPCIONAL: MÁS COLUMNAS EN PC */

@media(min-width:768px){
.radios{
grid-template-columns:repeat(3,1fr);
}
}

@media(min-width:1024px){
.radios{
grid-template-columns:repeat(4,1fr);
}
}

</style>

</head>

<body>

<!-- LOGO -->

<div class="header">
<img src="https://image2url.com/r2/default/images/1773416083732-ec4c7115-86a4-49a1-aaa8-8c9093b13595.jpeg">
</div>

<!-- RADIOS -->

<div class="radios">

<!-- STEREO M -->

<div class="radio" id="r1"
onclick="playRadio('https://sonic.globalstream.pro/8108/stream','Stereo M','r1')">

<div class="radio-top" style="background:#ffd400">

<img src="https://i.postimg.cc/L8bjb6K5/1687464033296.png">

<div class="play" id="b1">▶</div>

</div>

<div class="radio-name">Stereo M</div>

</div>

<!-- RADIO LA PATRONA -->

<div class="radio" id="r5"
onclick="playRadio('https://sonic.globalstream.pro/8080/stream','Radio La Patrona','r5')">

<div class="radio-top" style="background:#ff2e8a">

<img src="https://image2url.com/r2/default/images/1773782144520-db83b536-4765-45ec-b761-f51c5ee811ed.png" style="width:95px;">

<div class="play" id="b5">▶</div>

</div>

<div class="radio-name">Radio La Patrona</div>

</div>

<!-- MARCONY RADIO -->

<div class="radio" id="r2"
onclick="playRadio('https://radiostreaming.pro/8216/stream','Marcony Radio','r2')">

<div class="radio-top" style="background:#2f7edb">

<img src="https://image2url.com/r2/default/images/1773420804233-23cff9c7-2df0-45a2-aab1-9ad4df661614.png" style="width:95px;">

<div class="play" id="b2">▶</div>

</div>

<div class="radio-name">Marcony Radio</div>

</div>

<!-- LA TREMENDA -->

<div class="radio" id="r3"
onclick="playRadio('https://radiostreaming.pro/8238/stream','La Tremenda','r3')">

<div class="radio-top" style="background:#ff3d00">

<img src="https://imgfz.com/i/h7TrEm5.png">

<div class="play" id="b3">▶</div>

</div>

<div class="radio-name">La Tremenda</div>

</div>

<!-- LA GIGANTE -->

<div class="radio" id="r4"
onclick="playRadio('https://radiostreaming.pro/8234/stream','La Gigante','r4')">

<div class="radio-top" style="background:#00c21a">

<img src="https://image2url.com/r2/default/images/1773546122381-be7bfbb3-0de1-4e74-88e5-a3c61aaeae32.png" style="width:95px;">

<div class="play" id="b4">▶</div>

</div>

<div class="radio-name">La Gigante</div>

</div>

</div>

<!-- PLAYER -->

<div class="player">

<h3 id="radioTitle">Selecciona una radio</h3>

<audio controls id="player"></audio>

</div>

<!-- PUBLICIDAD -->

<div class="ads">

<h3>📢 Publicidad en nuestras radios</h3>

<p>Promociona tu negocio en el <b>Grupo Marcony</b></p>

<a href="https://wa.me/51942883375" target="_blank">
💬 Contactar por WhatsApp
</a>

</div>

<footer>

© 2026 Grupo Marcony – Plataforma de Radios Online

</footer>

<script>

const player = document.getElementById("player")
const title = document.getElementById("radioTitle")

let currentRadio = null
let playing = false

function playRadio(url,name,id){

const btn = document.querySelector("#"+id+" .play")

if(playing && currentRadio === id){

player.pause()
player.src=""

title.innerText="Radio detenida"

document.getElementById(id).classList.remove("active")

btn.innerHTML="▶"

playing=false
currentRadio=null

return

}

player.src=url+"?"+Date.now()
player.play()

title.innerText="🔴 EN VIVO: "+name

document.querySelectorAll(".radio").forEach(r=>{
r.classList.remove("active")
})

document.querySelectorAll(".play").forEach(b=>{
b.innerHTML="▶"
})

document.getElementById(id).classList.add("active")

btn.innerHTML="⏹"

currentRadio=id
playing=true

}

</script>

</body>
</html>
