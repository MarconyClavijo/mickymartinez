<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grupo Marcony | Radios en Vivo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(140deg,#0f0f0f,#200020,#000);
color:white;
text-align:center;
}

/* HEADER */

header{
padding:30px 20px;
}

header img{
width:220px;
border-radius:15px;
box-shadow:0 0 25px #ff00cc;
}

header h1{
margin:10px 0;
font-size:32px;
}

/* TARJETAS */

.radios{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
padding:20px;
}

.radio{
background:rgba(255,255,255,0.05);
border-radius:20px;
padding:20px;
width:260px;
transition:.3s;
box-shadow:0 0 25px rgba(0,0,0,.6);
}

.radio.active{
border:2px solid #ff0000;
box-shadow:0 0 30px #ff0000;
transform:scale(1.05);
}

.radio img{
width:120px;
margin-bottom:10px;
}

.radio h2{
margin:5px 0;
font-size:20px;
}

.radio button{
background:#ff0000;
border:none;
padding:12px 25px;
border-radius:30px;
color:white;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

/* PLAYER CENTRAL */

.player{
margin-top:20px;
padding:20px;
}

#nowPlaying{
font-size:18px;
margin-top:10px;
color:#00ffcc;
}

/* PUBLICIDAD */

.ads{
margin:40px auto;
max-width:700px;
background:linear-gradient(90deg,#ff0000,#ff7300);
padding:25px;
border-radius:20px;
}

.ads a{
display:inline-block;
margin-top:10px;
background:white;
color:black;
padding:12px 25px;
border-radius:30px;
text-decoration:none;
font-weight:bold;
}

/* FOOTER */

footer{
margin-top:40px;
padding:20px;
font-size:13px;
opacity:.8;
}

</style>
</head>

<body>

<header>

<img src="https://image2url.com/r2/default/images/1773416083732-ec4c7115-86a4-49a1-aaa8-8c9093b13595.jpeg">

<h1>GRUPO MARCONY</h1>

</header>

<div class="radios">

<!-- STEREO M -->

<div class="radio" id="stereom">

<img src="https://i.postimg.cc/L8bjb6K5/1687464033296.png">

<h2>Radio Stereo M</h2>

<button onclick="toggleRadio('https://sonic.globalstream.pro/8108/stream','Stereo M','stereom','https://sonic.globalstream.pro/8108/stats?json=1')">
▶ Play
</button>

</div>

<!-- MARCONY RADIO -->

<div class="radio" id="marcony">

<img src="https://image2url.com/r2/default/images/1773420804233-23cff9c7-2df0-45a2-aab1-9ad4df661614.png">

<h2>Marcony Radio</h2>

<button onclick="toggleRadio('https://radiostreaming.pro/8216/stream','Marcony Radio','marcony','https://radiostreaming.pro/8216/stats?json=1')">
▶ Play
</button>

</div>

<!-- LA TREMENDA -->

<div class="radio" id="tremenda">

<img src="https://imgfz.com/i/h7TrEm5.png">

<h2>La Tremenda 106.5 FM</h2>

<button onclick="toggleRadio('https://sonic.globalstream.pro/8080/stream','La Tremenda','tremenda','https://sonic.globalstream.pro/8080/stats?json=1')">
▶ Play
</button>

</div>

</div>

<div class="player">

<h2 id="radioName">Selecciona una radio</h2>

<div id="nowPlaying">🎵 Esperando reproducción...</div>

<audio id="player"></audio>

</div>

<div class="ads">

<h3>📢 Publicidad en nuestras radios</h3>

<p>Promociona tu negocio en el Grupo Marcony</p>

<a href="https://wa.me/51942883375">
WhatsApp 942883375 – Marcony Clavijo
</a>

</div>

<footer>

© 2026 Grupo Marcony – Radios del Norte del Perú

</footer>

<script>

const player=document.getElementById("player")
const radioName=document.getElementById("radioName")
const nowPlaying=document.getElementById("nowPlaying")

let currentRadio=null
let metadataUrl=null
let playing=false

function toggleRadio(url,name,id,meta){

const card=document.getElementById(id)
const button=card.querySelector("button")

if(currentRadio!==id){

document.querySelectorAll(".radio").forEach(r=>r.classList.remove("active"))
document.querySelectorAll(".radio button").forEach(b=>b.innerHTML="▶ Play")

player.src=url+"?"+Date.now()
player.play()

card.classList.add("active")

button.innerHTML="⏹ Stop"

radioName.innerText="🔴 EN VIVO: "+name

metadataUrl=meta

currentRadio=id

playing=true

getSong()

}else{

if(playing){

player.pause()

button.innerHTML="▶ Play"

card.classList.remove("active")

radioName.innerText="Radio detenida"

nowPlaying.innerText="🎵 Reproducción detenida"

playing=false

}else{

player.play()

button.innerHTML="⏹ Stop"

card.classList.add("active")

playing=true

}

}

}

async function getSong(){

setInterval(async()=>{

if(metadataUrl && playing){

try{

const res=await fetch(metadataUrl)

const data=await res.json()

nowPlaying.innerText="🎵 "+data.songtitle

}catch{

nowPlaying.innerText="🎵 Sonando ahora..."

}

}

},8000)

}

</script>

</body>
</html>
